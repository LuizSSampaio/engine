name: clang-tidy

on:
  push:
    branches: [master]
    paths:
      - '**/*.cpp'
      - '**/*.hpp'
      - '**/*.h'
      - '.clang-tidy'
  pull_request:
    paths:
      - '**/*.cpp'
      - '**/*.hpp'
      - '**/*.h'
      - '.clang-tidy'

jobs:
  tidy-check:
    name: Static analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            clang-tidy
          python -m pip install --upgrade pip
          python -m pip install 'meson>=1.6' ninja

      - name: Configure (generate compile_commands.json)
        run: |
          meson setup build \
            -Db_lundef=false \
            --buildtype=debug
        env:
          CC: clang
          CXX: clang++

      - name: Run clang-tidy
        run: |
          find . \( -name '*.cpp' \) \
            ! -path './subprojects/*' \
            ! -path './build/*' \
            | xargs clang-tidy \
                -p build \
                --warnings-as-errors='*'
